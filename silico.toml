[product]
name = "Xuss"
fw_name = "XUSS"
fw_version = "0.3.1"

[runtime]
mpy_cross = "1.28.0rc0.post2"
board = "m5go-v27"

[host]
gate = "pytest -q"
product_defaults = "firmware/defaults.py"

[hal]
allow_machine = ["hal_board"]

[deploy]
core = [
  "firmware/version.py",
  "firmware/defaults.py",
  "firmware/edge.py",
  "firmware/config.py",
  "firmware/store.py",
  "firmware/engine.py",
  "firmware/inputs.py",
  "firmware/riff.py",
  "firmware/link.py",
  "firmware/protocol.py",
  "firmware/face.py",
  "firmware/hal.py",
  "firmware/hal_board.py",
  "firmware/main.py",
]
