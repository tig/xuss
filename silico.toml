[product]
name = "Xuss"
fw_name = "XUSS"
fw_version = "0.0.1"

[runtime]
# Latest *stable* PyPI mpy-cross at plate ship time. After silico inspect,
# re-pin to the device MicroPython major.minor (see AGENTS.md mpy-cross notes).
# M5GO currently runs MicroPython 1.12 (UIFlow-era); plan is esptool → modern
# ESP32 MicroPython before claiming an honest ABI pin.
mpy_cross = "1.27.0.post2"
board = "m5go-v27"

[host]
gate = "pytest -q"
# Shipped parameter table the metal build runs. Host scenarios must exercise it.
product_defaults = "firmware/defaults.py"

# Modules (stems) allowed to import machine — device HAL backends only.
# Domain modules and main must stay host-importable under CPython.
[hal]
allow_machine = ["hal_board"]

# Ordered deploy set (basenames land on device as remote names).
# `silico deploy --port COMx` with no file args uses this list.
[deploy]
core = [
  "firmware/version.py",
  "firmware/defaults.py",
  "firmware/hal.py",
  "firmware/hal_board.py",
  "firmware/main.py",
]
